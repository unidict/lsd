name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake zlib1g-dev libvorbis-dev libunistring-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake zlib libvorbis libunistring

      - name: Cache vcpkg packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\packages
          key: vcpkg-windows-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: vcpkg-windows-

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install zlib:x64-windows libvorbis:x64-windows libunistring:x64-windows

      - name: Configure
        run: cmake -B build -DLSD_BUILD_TESTS=ON ${{ runner.os == 'Windows' && '-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake' || '' }}

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --verbose ${{ runner.os == 'Windows' && '-C Release' || '' }}
